<html>
  <head>
    <script src="..\scripts\socket.io.js"></script>
    <script src="..\scripts\jquery.js"></script>
    <script src="..\scripts\gameSettings.js"></script>
    <script src="..\scripts\videoSettings.js"></script>
    <script src="..\scripts\wall.js"></script>

    <link rel="stylesheet" href="..\styles\css.css">
  </head>

  <body class="wallView" id="body">

    <div id="wallStage">

      <video id="wallVideo" autoplay muted loop playsinline></video>

      <div id="wall" data-state="idle">

        <div class="wallCountdown" id="wallCountdown"></div>

        <video id="wallKick" class="wallKick" muted playsinline preload="auto"></video>

        <div class="wallTop">
          <div class="wallTimer" id="wallTimer">00:00</div>
        </div>

        <div class="wallGameOver">Game Over!</div>

        <div class="wallLanes">
          <div class="wallLane" data-lane="1">
            <div class="wallLaneScoreBox">
              <div class="wallLaneScore" id="wallScore1">0</div>
            </div>
            <video class="wallWinner" id="winner1" muted loop playsinline preload="auto"></video>
            <div class="confettiLayer" id="confetti1"></div>
          </div>
          <div class="wallLane" data-lane="2">
            <div class="wallLaneScoreBox">
              <div class="wallLaneScore" id="wallScore2">0</div>
            </div>
            <video class="wallWinner" id="winner2" muted loop playsinline preload="auto"></video>
            <div class="confettiLayer" id="confetti2"></div>
          </div>
        </div>

      </div>

      <video id="wallOverlay" muted loop playsinline preload="auto"></video>

    </div>

    <script>
      initWall()
    </script>

  </body>
</html>
